server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php;
    charset utf-8;

    client_max_body_size 20M;

    # Healthcheck do proxy/infra (não bate no PHP).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Honra o TLS terminado no Caddy (X-Forwarded-Proto) para o PHP.
        fastcgi_param HTTPS $http_x_forwarded_proto if_not_empty;
    }

    # Bloqueia dotfiles (exceto .well-known para ACME/Let's Encrypt).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
