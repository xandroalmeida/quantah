<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Protótipo — Solicitar saque (STORY-017)</title>
<!--
  PROTÓTIPO DE VALIDAÇÃO — NÃO É CÓDIGO DE PRODUÇÃO.
  Tokens reais do DS (design/system/tokens.md). Microcopy = screen-spec §5.
  Estados via ?state=form|erro|sucesso|sem-saldo ; viewport via ?vp=mobile|desktop.
-->
<style>
  :root{
    --primary:#9fe870;--on-primary:#0e0f0c;--primary-pale:#e2f6d5;--primary-neutral:#c5edab;
    --canvas:#fff;--canvas-soft:#e8ebe6;--ink:#0e0f0c;--ink-deep:#163300;--body:#454745;--mute:#868685;
    --positive-deep:#054d28;--negative:#d03238;--negative-bg:#320707;
    --r-xl:24px;--r-lg:16px;--r-pill:9999px;--f:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--f);background:var(--canvas-soft);color:var(--ink);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:16px 12px 0;gap:12px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;max-width:680px}
  .bar a{font-size:13px;text-decoration:none;color:var(--body);background:var(--canvas);
    border:1px solid var(--mute);border-radius:var(--r-pill);padding:4px 12px}
  .bar a.on{background:var(--ink);color:var(--canvas);border-color:var(--ink)}
  .bar .lbl{font-size:11px;color:var(--mute);text-transform:uppercase}
  .bar .sep{width:1px;height:20px;background:var(--mute);opacity:.5}
  .device{width:100%;max-width:412px;min-height:720px;background:var(--canvas-soft);border-radius:28px;
    border:1px solid #d5d9d2;overflow:hidden;display:flex;flex-direction:column}
  .device.desktop{max-width:560px;min-height:520px}
  .scroll{flex:1;overflow-y:auto;padding:20px 16px 28px}
  .wrap{display:flex;flex-direction:column;gap:16px;max-width:420px;margin:0 auto}
  h1{font-size:32px;font-weight:900;display:flex;align-items:center;gap:8px}
  .saldo{background:var(--ink);color:var(--primary-neutral);border-radius:var(--r-xl);padding:20px;
    display:flex;flex-direction:column;gap:4px}
  .saldo .l{font-size:14px}.saldo .v{font-size:32px;font-weight:900;color:var(--primary)}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:14px;font-weight:600;color:var(--ink)}
  .field input{min-height:52px;border-radius:var(--r-lg);border:1px solid var(--mute);padding:12px 16px;
    font-size:18px;background:var(--canvas)}
  .field.err input{border-color:var(--negative)}
  .field .msg{font-size:14px;color:var(--negative)}
  .note{font-size:14px;color:var(--body);background:var(--canvas-soft);border-radius:var(--r-lg);padding:10px 14px}
  .btn{min-height:52px;border:none;border-radius:var(--r-xl);font-size:16px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px}
  .btn.primary{background:var(--primary);color:var(--on-primary)}
  .btn.tertiary{background:transparent;color:var(--ink);border:1px solid var(--ink)}
  .card{background:var(--canvas);border-radius:var(--r-xl);padding:24px;display:flex;flex-direction:column;gap:12px}
  .ok{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
  .ok .ic{width:44px;height:44px;color:var(--positive-deep)}
  .ok h2{font-size:24px;font-weight:900}.ok p{font-size:16px;color:var(--body);max-width:34ch}
  .warn{background:var(--canvas);border-radius:var(--r-xl);padding:24px;text-align:center;
    display:flex;flex-direction:column;gap:12px;align-items:center}
  svg{stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
  <nav class="bar" id="bar"></nav>
  <div id="app"></div>
<script>
  const WALLET=`<svg style="width:24px;height:24px;color:var(--mute)" viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 9h13a2 2 0 0 1 0 4H3"/></svg>`;
  const CHECK=`<svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8.5 12 2.5 2.5 4.5-5"/></svg>`;

  const saldoCard=(v)=>`<section class="saldo" data-testid="screen-saque-saldo"><span class="l">Saldo disponível</span><span class="v">R$ ${v}</span></section>`;

  const form=(err)=>`
    <div class="wrap">
      <h1>Sacar ${WALLET}</h1>
      ${saldoCard('12,47')}
      <div class="field ${err==='valor'?'err':''}">
        <label for="v">Quanto você quer sacar?</label>
        <input id="v" data-testid="screen-saque-valor" placeholder="R$ 0,00" value="${err?'R$ 20,00':''}" inputmode="numeric"/>
        ${err==='valor'?`<span class="msg" data-testid="screen-saque-erro-valor">Você tem R$ 12,47 disponíveis.</span>`:''}
      </div>
      <div class="field ${err==='cpf'?'err':''}">
        <label for="c">CPF (sua chave PIX)</label>
        <input id="c" data-testid="screen-saque-cpf" placeholder="000.000.000-00" value="${err?'111.444.777-00':''}" inputmode="numeric"/>
        ${err==='cpf'?`<span class="msg" data-testid="screen-saque-erro-cpf">CPF inválido.</span>`:''}
      </div>
      <p class="note">Você recebe via PIX na chave do tipo CPF.</p>
      <button class="btn primary" data-testid="screen-saque-submit" onclick="go('sucesso')">Solicitar saque</button>
      <button class="btn tertiary">Cancelar</button>
    </div>`;

  const sucesso=()=>`
    <div class="wrap"><h1>Sacar ${WALLET}</h1>
      <div class="card"><div class="ok" data-testid="screen-saque-sucesso">${CHECK}
        <h2>Saque solicitado</h2>
        <p>Você recebe no PIX em até 3 dias úteis. A gente avisa por aqui.</p>
        <button class="btn primary">Voltar à carteira</button>
      </div></div>
    </div>`;

  const semSaldo=()=>`
    <div class="wrap"><h1>Sacar ${WALLET}</h1>
      ${saldoCard('3,20')}
      <div class="warn"><h2 style="font-size:20px;font-weight:900">Ainda não dá para sacar</h2>
        <p style="color:var(--body)">Você precisa de pelo menos R$ 5,00 para sacar.</p>
        <button class="btn tertiary">Voltar à carteira</button></div>
    </div>`;

  const BODY={ form:()=>form(false), erro:()=>form('valor'), sucesso, 'sem-saldo':semSaldo };

  function params(){return new URLSearchParams(location.search)}
  function go(s){const p=params();p.set('state',s);location.search=p.toString()}
  function render(){
    const p=params();const st=p.get('state')||'form';const vp=p.get('vp')||'mobile';
    document.getElementById('app').innerHTML=`<div class="device ${vp}"><div class="scroll">${(BODY[st]||BODY.form)()}</div></div>`;
    const states=Object.keys(BODY);
    document.getElementById('bar').innerHTML=`<span class="lbl">estado</span>`+
      states.map(k=>`<a href="?state=${k}&vp=${vp}" class="${k===st?'on':''}">${k}</a>`).join('')+
      `<span class="sep"></span><span class="lbl">tela</span>`+
      ['mobile','desktop'].map(v=>`<a href="?state=${st}&vp=${v}" class="${v===vp?'on':''}">${v}</a>`).join('');
  }
  render();
</script>
</body>
</html>
